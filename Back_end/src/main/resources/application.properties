spring.application.name=SignatureNumeriqueBackend

# --- Configuration PostgreSQL (Données métier & Identités) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/signature_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Configuration Hibernate / JPA ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.format_sql=true
spring.session.jdbc.initialize-schema=always

# --- Configuration MongoDB (Audit immuable) ---
MONGODB_URI=mongodb://mongodb:1@localhost:27017/mongo:1?authMechanism=SCRAM-SHA-256
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

spring.main.allow-bean-definition-overriding=true
spring.security.user.name=none
spring.security.user.password=none

# --- Envoi d'Emails (Gmail SMTP) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# --- Configuration Google OAuth2 ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:https://localhost:8443/login/oauth2/code/google}

google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# --- Configuration TSA (Horodatage électronique) ---
tsa.url=${TSA_URL:https://freetsa.org/tsr}
tsa.enabled=${TSA_ENABLED:true}
tsa.hash-algorithm=SHA256
tsa.certificate.path=classpath:tsa.crt
tsa.ca-certificate.path=classpath:cacert.pem
spring.mvc.async.request-timeout=30000

# --- Super Admin par défaut ---
app.superadmin.email=${SUPERADMIN_EMAIL:admin@example.com}
app.superadmin.password=${SUPERADMIN_PASSWORD:}
app.superadmin.nom=${SUPERADMIN_NOM:Admin}
app.superadmin.prenom=${SUPERADMIN_PRENOM:Super}
app.superadmin.telephone=${SUPERADMIN_TEL:+1234567890}
hsm.pin=${HSM_PIN:1234}
hsm.config=${HSM_CONFIG:src/main/resources/softhsm2.cfg}

# --- SERVEUR (SSL désactivé pour le cloud) ---
server.port=${PORT:8080}
server.ssl.enabled=${SSL_ENABLED:false}

# --- Configuration Thymeleaf pour les Emails ---
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.check-template-location=true

# Force l'IPv4 pour éviter les erreurs de résolution d'hôte sur Windows
spring.main.arguments=--java.net.preferIPv4Stack=true

# Ajout de propriétés JavaMail supplémentaires pour le débogage et la stabilité
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
logging.level.org.apache.catalina=${LOG_LEVEL_CATALINA:INFO}
logging.level.org.springframework.boot.web.embedded.tomcat=${LOG_LEVEL_TOMCAT:INFO}

# Durée de validité des certificats utilisateur (en minutes)
pki.certificat.duree.minutes=365

# Chemin de stockage des clés PKI
pki.stockage.chemin=${PKI_STOCKAGE:./coffre-pki}

# PIN pour le HSM
hsm.pin.utilisateur=${HSM_PIN_USER:1234}

# Archivage
archivage.dossier.base=${ARCHIVE_BASE:/data/archives}
archivage.duree.conservation.ans=10
archivage.format.pdfa=true
archivage.compression=true

app.frontend.url=${FRONTEND_URL:https://memoire-frontend.onrender.com}
