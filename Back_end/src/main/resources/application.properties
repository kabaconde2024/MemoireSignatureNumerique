spring.application.name=SignatureNumeriqueBackend

# --- Configuration Base de données (Priorité aux variables Render) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Hibernate & JPA ---
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- NoSQL (Audit) ---
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

# --- GMAIL (Port 587 - STARTTLS pour Render) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=kabaconde5259@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# --- Debugging ---
# IMPORTANT : On garde seulement true pour voir les erreurs SMTP dans les logs Render
spring.mail.properties.mail.debug=true
logging.level.org.springframework.security=INFO

# --- Configuration Serveur ---
server.port=${PORT:8080}
server.ssl.enabled=false

# --- PKI & Sécurité métier ---
pki.stockage.chemin=${PKI_STOCKAGE:./coffre-pki}
tsa.url=https://freetsa.org/tsr
tsa.enabled=true
hsm.pin=${HSM_PIN:1234}

# --- Divers ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.main.allow-bean-definition-overriding=true